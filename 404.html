<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>404 — Page Not Found | Ganesh Portfolio</title>
  <!-- Dark-mode flash prevention -->
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');})()</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="Portfolio.css"/>
  <style>
    /* ── Layout ── */
    html,body{height:100%;margin:0;padding:0;overflow-x:hidden;}
    body{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;text-align:center;font-family:var(--font);
      background:var(--bg);color:var(--text);
    }

    /* ── Star canvas ── */
    #starField{
      position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    }
    .star{
      position:absolute;border-radius:50%;background:#fff;
      animation:twinkle var(--dur,3s) ease-in-out infinite alternate;
      opacity:0;will-change:opacity,transform;
    }
    @keyframes twinkle{
      0%{opacity:0;transform:scale(.6);}
      50%{opacity:var(--peak,.8);}
      100%{opacity:.1;transform:scale(1.1);}
    }
    @keyframes drift{
      0%{transform:translateX(0) translateY(0);}
      100%{transform:translateX(var(--dx,20px)) translateY(var(--dy,-30px));}
    }
    .star.drifting{
      animation:twinkle var(--dur,3s) ease-in-out infinite alternate,
                drift calc(var(--dur,3s)*3) linear infinite alternate;
    }

    /* ── Shooting stars ── */
    .shoot{
      position:absolute;height:2px;
      background:linear-gradient(90deg,rgba(255,255,255,0),#c7d2fe,rgba(255,255,255,0));
      border-radius:999px;
      animation:shoot var(--sdur,2.4s) ease-in var(--sdel,0s) infinite;
      opacity:0;will-change:opacity,transform;
    }
    @keyframes shoot{
      0%{opacity:0;transform:translateX(0) scaleX(0);}
      5%{opacity:1;transform:translateX(0) scaleX(1);}
      60%{opacity:0;transform:translateX(220px) scaleX(0.4);}
      100%{opacity:0;transform:translateX(300px) scaleX(0);}
    }

    /* ── Theme toggle ── */
    #themeToggle{
      position:fixed;top:1rem;right:1rem;z-index:100;
      width:42px;height:42px;border-radius:50%;
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;
      box-shadow:var(--shadow-card);
      transition:background var(--t),border-color var(--t),transform .2s,box-shadow .2s;
    }
    #themeToggle:hover{transform:scale(1.1);box-shadow:0 0 0 3px rgba(99,102,241,.25);}

    /* ── Back link ── */
    #backLink{
      position:fixed;top:1rem;left:1rem;z-index:100;
      display:inline-flex;align-items:center;gap:.45rem;
      padding:.5rem 1rem;border-radius:2rem;
      font-size:.85rem;font-weight:600;
      border:1px solid var(--border);
      background:var(--card);color:var(--text);
      text-decoration:none;
      box-shadow:var(--shadow-card);
      transition:background var(--t),color var(--t),transform .2s,box-shadow .2s;
    }
    #backLink:hover{transform:translateX(-3px);box-shadow:0 0 0 3px rgba(99,102,241,.2);color:var(--primary);}
    #backLink i{font-size:.8rem;}

    /* ── Main card ── */
    .err-wrap{
      position:relative;z-index:1;
      max-width:560px;width:100%;
      padding:2.5rem 2rem;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:1.5rem;
      box-shadow:0 0 0 1px rgba(99,102,241,.08),0 24px 64px rgba(0,0,0,.18);
      margin:5rem 1rem 2rem;
    }
    body[data-theme="dark"] .err-wrap{
      background:rgba(26,34,53,.75);
      -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
      box-shadow:0 0 0 1px rgba(129,140,248,.12),0 24px 64px rgba(0,0,0,.45);
    }

    /* ── 404 glow number ── */
    .err-code{
      font-size:clamp(5rem,22vw,8.5rem);
      font-weight:900;line-height:1;letter-spacing:-.04em;
      background:linear-gradient(135deg,#4f46e5 0%,#818cf8 40%,#06b6d4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 28px rgba(99,102,241,.55));
      animation:codePulse 3s ease-in-out infinite alternate;
      display:block;margin-bottom:.15rem;
    }
    @keyframes codePulse{
      0%{filter:drop-shadow(0 0 18px rgba(99,102,241,.45));}
      100%{filter:drop-shadow(0 0 42px rgba(6,182,212,.65));}
    }

    /* ── Astronaut icon ── */
    .err-icon-wrap{
      width:88px;height:88px;border-radius:50%;
      background:linear-gradient(135deg,rgba(79,70,229,.15),rgba(6,182,212,.1));
      border:1px solid rgba(99,102,241,.2);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 1.25rem;
      animation:float 4s ease-in-out infinite;
      box-shadow:0 0 20px rgba(99,102,241,.15);will-change:transform;
    }
    .err-icon-wrap i{font-size:2.5rem;background:linear-gradient(135deg,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    @keyframes float{
      0%,100%{transform:translateY(0) rotate(-3deg);}
      50%{transform:translateY(-12px) rotate(3deg);}
    }

    /* ── Orbit ring around icon ── */
    .err-orbit{
      position:relative;width:88px;height:88px;margin:0 auto 1.25rem;
    }
    .err-orbit-ring{
      position:absolute;inset:-16px;
      border:1px solid rgba(99,102,241,.25);
      border-radius:50%;
      animation:orbit 8s linear infinite;will-change:transform;
    }
    .err-orbit-ring::after{
      content:"";position:absolute;top:-4px;left:50%;
      width:8px;height:8px;border-radius:50%;margin-left:-4px;
      background:linear-gradient(135deg,#4f46e5,#06b6d4);
      box-shadow:0 0 8px rgba(99,102,241,.8);
    }
    @keyframes orbit{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

    /* ── Text ── */
    .err-title{font-size:clamp(1.3rem,4vw,1.65rem);font-weight:700;margin:.25rem 0 .75rem;color:var(--text-dark);}
    .err-desc{color:var(--text-muted);font-size:.95rem;line-height:1.6;max-width:400px;margin:0 auto 1.75rem;}

    /* ── Buttons ── */
    .err-actions{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.75rem;}
    .err-btn-primary{
      display:inline-flex;align-items:center;gap:.5rem;
      padding:.7rem 1.6rem;border-radius:2rem;
      font-weight:600;font-size:.92rem;
      background:linear-gradient(135deg,#4f46e5,#06b6d4);
      color:#fff;border:none;cursor:pointer;text-decoration:none;
      box-shadow:0 4px 16px rgba(79,70,229,.35);
      transition:transform .2s,box-shadow .2s;
    }
    .err-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,.45);color:#fff;}
    .err-btn-ghost{
      display:inline-flex;align-items:center;gap:.5rem;
      padding:.7rem 1.6rem;border-radius:2rem;
      font-weight:600;font-size:.92rem;
      background:transparent;color:var(--text);
      border:1px solid var(--border);cursor:pointer;text-decoration:none;
      transition:transform .2s,border-color .2s,color .2s,background .2s;
    }
    .err-btn-ghost:hover{transform:translateY(-2px);border-color:rgba(99,102,241,.4);color:var(--primary);background:rgba(99,102,241,.07);}

    /* ── Quick links ── */
    .err-links-label{font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.75rem;}
    .err-links{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;}
    .err-link{
      display:inline-flex;align-items:center;gap:.35rem;
      padding:.35rem .85rem;border-radius:2rem;
      font-size:.8rem;font-weight:500;
      background:rgba(99,102,241,.07);
      border:1px solid rgba(99,102,241,.15);
      color:var(--text-muted);text-decoration:none;
      transition:background .2s,color .2s,border-color .2s,transform .15s;
    }
    .err-link:hover{background:rgba(99,102,241,.15);color:var(--primary);border-color:rgba(99,102,241,.35);transform:translateY(-1px);}
    .err-link i{font-size:.72rem;}

    /* ── Divider ── */
    .err-divider{width:48px;height:2px;border-radius:999px;background:linear-gradient(90deg,#4f46e5,#06b6d4);margin:1.5rem auto;}

    /* ── Responsive ── */
    @media(max-width:480px){
      .err-wrap{padding:2rem 1.25rem;margin:4.5rem .75rem 1.5rem;}
      .err-actions{flex-direction:column;align-items:center;}
      .err-btn-primary,.err-btn-ghost{width:100%;justify-content:center;}
      .err-orbit-ring{display:none;}
    }
    @media(prefers-reduced-motion:reduce){
      .err-code{animation:none;filter:drop-shadow(0 0 18px rgba(99,102,241,.5));}
      .err-icon-wrap{animation:none;}
      .err-orbit-ring{animation:none;}
      .star,.shoot{animation:none;opacity:.4;}
    }
  </style>
</head>
<body>

  <!-- Star field -->
  <div id="starField" aria-hidden="true"></div>

  <!-- Back link -->
  <a href="/" id="backLink" aria-label="Back to portfolio">
    <i class="fas fa-arrow-left"></i> Back to Portfolio
  </a>

  <!-- Theme toggle -->
  <button type="button" id="themeToggle" aria-label="Toggle theme">
    <i class="fas fa-moon" id="themeIcon"></i>
  </button>

  <!-- Main content -->
  <main class="err-wrap" role="main">

    <!-- Icon with orbit ring -->
    <div class="err-orbit" aria-hidden="true">
      <div class="err-orbit-ring"></div>
      <div class="err-icon-wrap">
        <i class="fas fa-user-astronaut"></i>
      </div>
    </div>

    <!-- 404 -->
    <div class="err-code" aria-hidden="true">404</div>

    <!-- Heading -->
    <h1 class="err-title">Page Not Found</h1>
    <p class="err-desc">Looks like you've drifted into deep space. This page doesn't exist or may have been moved.</p>

    <!-- Actions -->
    <div class="err-actions">
      <a href="/" class="err-btn-primary">
        <i class="fas fa-home"></i> Go Home
      </a>
      <a href="/#contact" class="err-btn-ghost">
        <i class="fas fa-envelope"></i> Contact Me
      </a>
    </div>

    <div class="err-divider" aria-hidden="true"></div>

    <!-- Quick nav -->
    <p class="err-links-label">Explore the portfolio</p>
    <nav class="err-links" aria-label="Portfolio quick links">
      <a href="/#about"        class="err-link"><i class="fas fa-user"></i> About</a>
      <a href="/#timeline"     class="err-link"><i class="fas fa-briefcase"></i> Experience</a>
      <a href="/#skills"       class="err-link"><i class="fas fa-code"></i> Skills</a>
      <a href="/#projects"     class="err-link"><i class="fas fa-folder-open"></i> Projects</a>
      <a href="/#achievements" class="err-link"><i class="fas fa-trophy"></i> Achievements</a>
      <a href="/gallery.html"  class="err-link"><i class="fas fa-images"></i> Gallery</a>
    </nav>

  </main>

  <script>
    /* ── Theme toggle ── */
    const btn  = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');
    function applyTheme(dark){
      document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
      icon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    // init from html attr set by flash-prevention script
    const initDark = document.documentElement.getAttribute('data-theme') === 'dark'
      || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme:dark)').matches);
    applyTheme(initDark);
    btn.addEventListener('click', () => {
      applyTheme(document.body.getAttribute('data-theme') !== 'dark');
    });

    /* ── Star field ── */
    (function(){
      const container = document.getElementById('starField');
      const W = window.innerWidth, H = window.innerHeight;
      const reduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

      // Static stars
      for(let i = 0; i < 180; i++){
        const s = document.createElement('div');
        s.className = 'star' + (Math.random() > .6 ? ' drifting' : '');
        const size = Math.random() * 2.5 + .5;
        const dur  = (Math.random() * 4 + 2).toFixed(1);
        const del  = (Math.random() * 4).toFixed(1);
        const peak = (Math.random() * .5 + .3).toFixed(2);
        const dx   = (Math.random() * 40 - 20).toFixed(0);
        const dy   = (Math.random() * 40 - 20).toFixed(0);
        s.style.cssText = [
          `left:${(Math.random()*100).toFixed(2)}%`,
          `top:${(Math.random()*100).toFixed(2)}%`,
          `width:${size.toFixed(1)}px`,
          `height:${size.toFixed(1)}px`,
          `--dur:${dur}s`,
          `--del:${del}s`,
          `--peak:${peak}`,
          `--dx:${dx}px`,
          `--dy:${dy}px`,
          `animation-delay:${del}s`,
          reduced ? 'opacity:.35' : ''
        ].filter(Boolean).join(';');
        container.appendChild(s);
      }

      // Shooting stars
      if(!reduced){
        for(let i = 0; i < 6; i++){
          const sh = document.createElement('div');
          sh.className = 'shoot';
          const w = Math.random() * 100 + 60;
          sh.style.cssText = [
            `width:${w}px`,
            `left:${(Math.random()*70).toFixed(1)}%`,
            `top:${(Math.random()*55).toFixed(1)}%`,
            `--sdur:${(Math.random()*2+1.8).toFixed(1)}s`,
            `--sdel:${(Math.random()*8).toFixed(1)}s`,
            `transform:rotate(-${(Math.random()*20+10).toFixed(0)}deg)`,
            `transform-origin:left center`
          ].join(';');
          container.appendChild(sh);
        }
      }
    })();
  </script>
</body>
</html>
